[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["agent"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: requires GitHub token and network access",
]
timeout = 120
